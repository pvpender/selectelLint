name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Testing
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: true

    - name: Golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.10

    - name: Run unit tests
      working-directory: analyzers/selectelLint
      run: |
        go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
      shell: bash

    - name: Upload coverage
      uses: codecov/codecov-action@v5
      with:
        files: ./analyzers/selectelLint/coverage.txt
        flags: unittests
        name: codecov-umbrella

  build:
    name: Build and deploy
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: true

    - name: Install golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        install-only: true
        version: v2.10

    - name: Build custom linter binary
      if: github.event_name == 'release' || github.ref == 'refs/heads/main'
      run: |
          golangci-lint custom -v
          
          if [ -f "custom-gcl" ]; then
            VERSION="${{ github.ref_name }}"
            if [ "$VERSION" = "" ]; then
              VERSION="latest"
            else
              VERSION=$(echo "$VERSION" | sed 's/refs\/tags\///')
            fi
            mv custom-gcl "selectellint-$VERSION"
            chmod +x "selectellint-$VERSION"
          fi
      shell: bash

    - name: Upload binary to workflow artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: selectellint-binary
        path: |
          selectellint-*
          !**/go-build/**
        retention-days: 30
        if-no-files-found: warn

    - name: Upload to release assets
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: ./selectellint-${{ github.ref_name }}


    - name: Create latest binary
      if: github.ref == 'refs/heads/main'
      run: |
        LATEST=$(ls -t selectellint-* 2>/dev/null | head -1)
        if [ -n "$LATEST" ]; then
          cp "$LATEST" "selectellint-latest"
          echo "LATEST_BINARY=selectellint-latest" >> $GITHUB_ENV
        fi
      shell: bash

    - name: Upload latest binary
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: selectellint-latest
        path: selectellint-latest
        retention-days: 90
