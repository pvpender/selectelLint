name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Prepare - Setup Go
      uses: actions/setup-go@v4
      with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: |
            **/go.sum
            **/go.mod

    - name: Prepare - Install golangci-lint
      run: |
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      shell: bash

    - name: Prepare - Install dependencies
      run: go mod download
      shell: bash

    - name: Test - Run unit tests
      working-directory: analyzers/selectelLint
      run: |
        go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
      shell: bash

    - name: Test - Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./analyzers/selectelLint/coverage.txt
        flags: unittests
        name: codecov-umbrella

    - name: Deploy - Build custom linter binary
      if: github.event_name == 'release' || github.ref == 'refs/heads/main'
      run: |
          golangci-lint custom -v -c .custom-gcl.yml
          
          if [ -f "custom-gcl" ]; then
            VERSION="${{ github.ref_name }}"
            if [ "$VERSION" = "" ]; then
              VERSION="latest"
            else
              VERSION=$(echo "$VERSION" | sed 's/refs\/tags\///')
            fi
            mv custom-gcl "selectellint-$VERSION"
            chmod +x "selectellint-$VERSION"
          fi
      shell: bash

    - name: Deploy - Upload binary to workflow artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: selectellint-binary
        path: |
          selectellint-*
          !**/go-build/**
        retention-days: 30
        if-no-files-found: warn

    - name: Deploy - Upload to release assets
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./selectellint-${{ github.ref_name }}
        asset_name: selectellint-${{ github.ref_name }}
        asset_content_type: application/octet-stream

    - name: Deploy - Create latest binary
      if: github.ref == 'refs/heads/main'
      run: |
        LATEST=$(ls -t selectellint-* 2>/dev/null | head -1)
        if [ -n "$LATEST" ]; then
          cp "$LATEST" "selectellint-latest"
          echo "LATEST_BINARY=selectellint-latest" >> $GITHUB_ENV
        fi
      shell: bash

    - name: Deploy - Upload latest binary
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: selectellint-latest
        path: selectellint-latest
        retention-days: 90
